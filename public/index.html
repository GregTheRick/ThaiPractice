<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thai Practice</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon.svg">
  <meta name="theme-color" content="#1e3a8a">
  <link rel="stylesheet" href="/style.css">
  <script src="https://unpkg.com/vue@3.5/dist/vue.global.prod.js"></script>
</head>
<body>
<div id="app" v-cloak>

  <!-- login / register -->
  <form v-if="view === 'login'" class="login card" @submit.prevent="auth">
    <h1>ไทย Practice</h1>
    <input v-model="username" placeholder="Username" required autocapitalize="off" autocomplete="username">
    <input type="password" v-model="password" placeholder="Password" required
           :autocomplete="registering ? 'new-password' : 'current-password'">
    <button>{{ registering ? 'Create account' : 'Log in' }}</button>
    <button type="button" class="link" @click="registering = !registering; error = ''">
      {{ registering ? 'Have an account? Log in' : 'New here? Create an account' }}
    </button>
    <p class="bad" v-if="error">{{ error }}</p>
  </form>

  <template v-else>
    <nav>
      <h1>ไทย</h1>
      <button :class="{ active: view === 'words' }" @click="view = 'words'; load()">Words</button>
      <button :class="{ active: view === 'practice' }" @click="view = 'practice'; quiz.mode = null">Practice</button>
      <button class="logout" @click="logout" aria-label="Log out"
              :title="'Log out ' + me">{{ me }} ↪</button>
    </nav>

    <!-- words -->
    <section v-if="view === 'words'">
      <form class="card add" @submit.prevent="saveWord">
        <div class="row">
          <input id="thai-input" v-model="form.thai" placeholder="Thai — น้ำ (optional)" lang="th"
                 autocomplete="off">
          <button type="button" class="kb-toggle" :class="{ active: kbOn }" @click="toggle('kbOn')"
                  aria-label="Toggle on-screen Thai keyboard">⌨</button>
        </div>
        <thai-keyboard v-if="kbOn" target="thai-input"></thai-keyboard>
        <div class="row">
          <input id="phonetic-input" v-model="form.phonetic" placeholder="Phonetic (optional) — nám"
                 autocomplete="off" autocapitalize="off">
          <button type="button" class="kb-toggle" :class="{ active: kbPhon }" @click="toggle('kbPhon')"
                  aria-label="Toggle phonetic character palette">⌨</button>
        </div>
        <thai-keyboard v-if="kbPhon" target="phonetic-input" :layout="phoneticRows"></thai-keyboard>
        <div class="row">
          <input v-model="newMeaning" placeholder="Meaning — water" autocomplete="off"
                 @keydown.enter.prevent="addMeaning">
          <button type="button" @click="addMeaning" aria-label="Add meaning">+</button>
        </div>
        <div class="chips" v-if="form.meanings.length">
          <button type="button" class="chip" v-for="(m, i) in form.meanings" :key="m"
                  @click="form.meanings.splice(i, 1)" :title="'Remove ' + m">{{ m }} ✕</button>
        </div>
        <div class="row">
          <button>{{ form.id ? 'Save' : 'Add word' }}</button>
          <button type="button" v-if="form.id" @click="resetForm">Cancel</button>
        </div>
        <p class="bad" v-if="error">{{ error }}</p>
      </form>

      <ul class="words">
        <li v-for="w in words" :key="w.id">
          <button class="speak" v-if="w.thai" @click="speak(w.thai)" :aria-label="'Speak ' + w.thai">🔊</button>
          <span class="speak" v-else aria-hidden="true"></span>
          <button class="speak" v-if="w.thai" @click="speak(w.thai, 0.6)"
                  :aria-label="'Speak slowly ' + w.thai">🐢</button>
          <span class="speak" v-else aria-hidden="true"></span>
          <div class="txt">
            <span class="thai">{{ w.thai || w.phonetic }}</span>
            <span class="phon" v-if="w.thai && w.phonetic">{{ w.phonetic }}</span>
            <span class="mean">{{ w.meanings.join(' · ') }}</span>
          </div>
          <div class="boxes" title="Leitner box per mode">
            <span v-for="m in modes.filter(m => eligible(w, m))" :key="m.id">{{ m.badge }}{{ w.boxes[m.id] || '·' }}</span>
          </div>
          <button @click="editWord(w)" aria-label="Edit">✎</button>
          <button @click="delWord(w)" aria-label="Delete">🗑</button>
        </li>
      </ul>
      <p class="center" v-if="!words.length">No words yet — add your first one above.</p>
    </section>

    <!-- practice -->
    <section v-else>
      <div v-if="!quiz.mode" class="modes">
        <template v-for="g in ['Thai script', 'Phonetics']" :key="g">
          <h3>{{ g }}</h3>
          <button v-for="m in modes.filter(m => m.group === g)" :key="m.id" class="card" @click="startQuiz(m.id)">
            <strong>{{ m.name }}</strong><small>{{ m.desc }}</small>
          </button>
        </template>
      </div>

      <div v-else-if="quiz.i >= quiz.words.length" class="card center">
        <template v-if="quiz.words.length">
          <h2>Done!</h2>
          <p><span class="good">{{ quiz.right }} right</span> · <span class="bad">{{ quiz.wrong }} wrong</span></p>
        </template>
        <template v-else>
          <h2>Nothing due 🎉</h2>
          <p>Every word in “{{ modeName(quiz.mode) }}” is scheduled for later.</p>
        </template>
        <button @click="quiz.mode = null">Back</button>
      </div>

      <div v-else class="card quiz">
        <p class="progress">{{ quiz.i + 1 }} / {{ quiz.words.length }} · {{ modeName(quiz.mode) }}</p>

        <p v-if="curMode.prompt === 'meanings'" class="prompt">{{ cur.meanings.join(' · ') }}</p>
        <p v-else-if="curMode.prompt === 'audio'" class="prompt">
          <button type="button" class="speak big" @click="speak(cur.thai)">🔊 Play</button>
          <button type="button" class="speak big" @click="speak(cur.thai, 0.6)" aria-label="Play slowly">🐢</button>
        </p>
        <p v-else-if="curMode.prompt === 'phonetic'" class="prompt thai">{{ cur.phonetic }}</p>
        <p v-else class="prompt thai">{{ cur.thai }}</p>

        <!-- reveal + self-grade -->
        <template v-if="curMode.answer === 'self'">
          <button v-if="!quiz.revealed" @click="quiz.revealed = true">Show answer</button>
          <template v-else>
            <p class="answer">{{ cur.meanings.join(' · ') }} <small v-if="cur.phonetic">({{ cur.phonetic }})</small></p>
            <div class="row">
              <button class="good-btn" @click="grade(true)">Knew it</button>
              <button class="bad-btn" @click="grade(false)">Missed it</button>
            </div>
          </template>
        </template>

        <!-- typed modes -->
        <template v-else>
          <form v-if="quiz.result === null" @submit.prevent="submitAnswer">
            <div class="row">
              <input id="quiz-input" v-model="quiz.answer" autocomplete="off" autocapitalize="off"
                     :lang="curMode.answer === 'thai' ? 'th' : 'en'"
                     :placeholder="curMode.answer === 'thai' ? 'Type the Thai word'
                       : curMode.answer === 'phonetic' ? 'Type the phonetic — nám' : 'Type a meaning in English'">
              <button type="button" v-if="curMode.answer === 'thai'" class="kb-toggle" :class="{ active: kbOn }"
                      @click="toggle('kbOn')" aria-label="Toggle on-screen Thai keyboard">⌨</button>
              <button type="button" v-else-if="curMode.answer === 'phonetic'" class="kb-toggle" :class="{ active: kbPhon }"
                      @click="toggle('kbPhon')" aria-label="Toggle phonetic character palette">⌨</button>
            </div>
            <thai-keyboard v-if="kbOn && curMode.answer === 'thai'" target="quiz-input"></thai-keyboard>
            <thai-keyboard v-else-if="kbPhon && curMode.answer === 'phonetic'" target="quiz-input"
                           :layout="phoneticRows"></thai-keyboard>
            <template v-if="curMode.answer === 'meanings'">
              <div class="chips" v-if="quiz.found.length">
                <span class="chip good-chip" v-for="m in quiz.found" :key="m">✓ {{ m }}</span>
              </div>
              <p class="progress">{{ quiz.found.length }} / {{ cur.meanings.length }} meanings found</p>
              <div class="row">
                <button>Check</button>
                <button type="button" @click="giveUp">Reveal</button>
              </div>
            </template>
            <button v-else>Check</button>
          </form>
          <template v-else>
            <p :class="quiz.result ? 'good' : 'bad'">{{ quiz.result ? '✓ Correct!' : '✗ Not quite' }}</p>
            <p class="answer thai">{{ cur.thai || cur.phonetic }}
              <small v-if="cur.thai && cur.phonetic">({{ cur.phonetic }})</small></p>
            <div class="chips center-chips" v-if="curMode.answer === 'meanings'">
              <span class="chip" :class="quiz.found.includes(m) ? 'good-chip' : 'bad-chip'"
                    v-for="m in cur.meanings" :key="m">{{ quiz.found.includes(m) ? '✓' : '✗' }} {{ m }}</span>
            </div>
            <p class="answer" v-else>{{ cur.meanings.join(' · ') }}</p>
            <button @click="next">Next</button>
          </template>
        </template>
      </div>
    </section>
  </template>
</div>
<script src="/keyboard.js"></script>
<script src="/app.js"></script>
</body>
</html>
